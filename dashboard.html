<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivid Voice — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- UMD builds — work locally AND on Vercel -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@latest/dist/index.umd.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan: #00c8f0;
      --cyan-light: #e0f9ff;
      --gold: #f5a623;
      --gold-light: #fff8e6;
      --orange: #ff6b35;
      --orange-light: #fff2ee;
      --dark: #0a0a0f;
      --text: #111827;
      --text2: #374151;
      --muted: #6b7280;
      --border: #e5e7eb;
      --surface: #f9fafb;
      --white: #ffffff;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
      background: var(--white); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-brand {
      padding: 24px 20px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .brand-icon {
      width: 36px; height: 36px; background: var(--dark); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .brand-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .brand-text span { color: var(--cyan); }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-label {
      font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); padding: 0 8px; margin-bottom: 6px; margin-top: 16px; display: block;
    }
    .nav-section-label:first-child { margin-top: 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 9px 10px;
      border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; transition: background .15s, color .15s;
      margin-bottom: 1px; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface); color: var(--text); }
    .nav-item.active { background: var(--dark); color: #fff; }
    .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-cyan   { background: var(--cyan); }
    .dot-gold   { background: var(--gold); }
    .dot-orange { background: var(--orange); }
    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
    .logout-btn {
      display: flex; align-items: center; gap: 8px; padding: 9px 10px;
      border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--muted);
      cursor: pointer; background: none; border: none; width: 100%; transition: background .15s, color .15s;
    }
    .logout-btn:hover { background: #fef2f2; color: #ef4444; }

    /* Main */
    .main { margin-left: 240px; min-height: 100vh; }
    .topbar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .badge-live {
      font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
      background: rgba(34,197,94,.1); color: #16a34a; border: 1px solid rgba(34,197,94,.25);
    }
    .back-to-home {
      font-size: 12px; font-weight: 500; color: var(--muted); text-decoration: none;
      padding: 6px 12px; border: 1px solid var(--border); border-radius: 7px;
      transition: border-color .15s, color .15s;
    }
    .back-to-home:hover { border-color: var(--text); color: var(--text); }
    .content { padding: 28px 32px; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .stat-label { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -1px; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* Tabs */
    .agent-tabs {
      display: flex; gap: 4px; background: var(--white);
      border: 1px solid var(--border); border-radius: 10px; padding: 4px;
      margin-bottom: 24px; width: fit-content;
    }
    .agent-tab {
      display: flex; align-items: center; gap: 8px; padding: 9px 20px;
      border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; background: none; color: var(--muted);
      transition: background .15s, color .15s;
    }
    .agent-tab.tab-active { background: var(--dark); color: #fff; }
    .agent-tab:hover:not(.tab-active) { background: var(--surface); color: var(--text); }

    /* Call section */
    .call-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .call-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
    .call-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
    .call-agent-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .call-agent-role { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .call-avatar { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .avatar-sara  { background: var(--cyan-light); }
    .avatar-zara  { background: var(--gold-light); }
    .avatar-nadia { background: var(--orange-light); }
    .call-status {
      display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
      margin-bottom: 12px; padding: 6px 10px; border-radius: 7px;
      background: var(--surface); color: var(--muted);
    }
    .call-status.active-call { background: rgba(34,197,94,.08); color: #16a34a; }
    .call-status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .call-status.active-call .call-status-dot { animation: pulse-dot 1.2s infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
    .call-timer { font-family: 'DM Mono', monospace; font-size: 13px; }
    .call-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s; letter-spacing: -0.1px;
    }
    .call-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .call-btn:active { transform: translateY(0); }
    .call-btn:disabled { opacity: .6; cursor: not-allowed; }
    .btn-sara  { background: var(--cyan);   color: var(--dark); }
    .btn-zara  { background: var(--gold);   color: var(--dark); }
    .btn-nadia { background: var(--orange); color: #fff; }
    .btn-end   { background: #fef2f2 !important; color: #ef4444 !important; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
    .chart-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .chart-sub   { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
    .chart-area  { height: 200px; width: 100%; }

    /* Calls table */
    .calls-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 28px; overflow: hidden; }
    .calls-card-header {
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .calls-card-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
    .calls-count-badge {
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px;
      background: var(--surface); color: var(--muted); border: 1px solid var(--border);
    }
    .calls-table { width: 100%; border-collapse: collapse; }
    .calls-table th {
      padding: 11px 16px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
      text-align: left; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .calls-table td { padding: 13px 16px; font-size: 13px; color: var(--text2); border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    .calls-table tr:last-child td { border-bottom: none; }
    .calls-table tr:hover td { background: #fafafa; }
    .call-id-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface); padding: 2px 7px; border-radius: 5px; }
    .duration-badge { font-family: 'DM Mono', monospace; font-size: 12px; padding: 3px 8px; border-radius: 5px; background: var(--surface); color: var(--text2); }
    .recording-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 500; color: var(--cyan); text-decoration: none;
      padding: 4px 10px; border-radius: 6px; background: var(--cyan-light);
    }
    .recording-btn:hover { opacity: .75; }
    .no-rec { font-size: 12px; color: #d1d5db; }
    .transcript-wrap { max-width: 280px; }
    .transcript-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expand-btn { font-size: 11px; color: var(--muted); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; margin-top: 2px; display: block; }
    .pca-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .pca-pill { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 12px; background: var(--surface); color: var(--text2); border: 1px solid var(--border); }

    /* Empty / loading */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-icon  { font-size: 32px; margin-bottom: 12px; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
    .empty-sub   { font-size: 13px; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--cyan);
      border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Transcript modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: #fff; border-radius: 16px; width: 100%; max-width: 600px; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(10px); transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title  { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
    .modal-close  {
      width: 30px; height: 30px; border-radius: 7px; background: var(--surface);
      border: none; cursor: pointer; font-size: 16px; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 20px 24px; overflow-y: auto; font-size: 13px; color: var(--text2); line-height: 1.65; white-space: pre-wrap; font-family: 'DM Mono', monospace; }

    /* About card */
    .about-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; }
    .about-name  { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .about-text  { font-size: 13px; color: var(--muted); line-height: 1.65; }
  </style>
</head>
<body>

<!-- Auth guard — runs immediately before anything renders -->
<script>
  if (localStorage.getItem('banking_auth') !== 'authenticated') {
    window.location.replace('login.html');
  }
</script>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🏦</div>
    <div class="brand-text">Vivid <span>Voice</span></div>
  </div>
  <nav class="sidebar-nav">
    <span class="nav-section-label">Overview</span>
    <button class="nav-item active" id="nav-overview" onclick="switchTab('overview')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </button>
    <span class="nav-section-label">Agents</span>
    <button class="nav-item" id="nav-sara"  onclick="switchTab('sara')">
      <div class="nav-dot dot-cyan"></div> Sara — FAQ Support
    </button>
    <button class="nav-item" id="nav-zara"  onclick="switchTab('zara')">
      <div class="nav-dot dot-gold"></div> Zara — Sales
    </button>
    <button class="nav-item" id="nav-nadia" onclick="switchTab('nadia')">
      <div class="nav-dot dot-orange"></div> Nadia — Complaints
    </button>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      Sign out
    </button>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">Banking Voice Agents</div>
    <div class="topbar-right">
      <span class="badge-live">● Live</span>
      <a href="index.html" class="back-to-home">← Home</a>
    </div>
  </header>
  <div class="content" id="app-root">
    <div style="padding:60px;text-align:center;color:#9ca3af;font-size:14px;">
      <span class="spinner"></span> Loading…
    </div>
  </div>
</main>

<!-- Transcript Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Call Transcript</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────
const AGENTS = {
  sara:  { id:'agent_fa9b348a78254f61b2aecc7936', name:'Sara',  role:'FAQ Support',  emoji:'🏦', color:'#00c8f0', light:'#e0f9ff', avatarClass:'avatar-sara',  btnClass:'btn-sara'  },
  zara:  { id:'agent_318393fc9565f28c8b31fc2ae3', name:'Zara',  role:'Sales',        emoji:'📈', color:'#f5a623', light:'#fff8e6', avatarClass:'avatar-zara',  btnClass:'btn-zara'  },
  nadia: { id:'agent_687ccd039e4d348dd7829b71e0', name:'Nadia', role:'Complaints',   emoji:'🛡️', color:'#ff6b35', light:'#fff2ee', avatarClass:'avatar-nadia', btnClass:'btn-nadia' },
};

const ABOUT = {
  sara:  'Sara handles inbound FAQ support for HBL customers. She answers account queries, explains card features, provides branch info, and guides customers through common banking processes — fluently in both English and Urdu.',
  zara:  'Zara is HBL\'s AI sales specialist. She pitches loans, credit cards, and investment products, qualifies leads, and books follow-up appointments for relationship managers.',
  nadia: 'Nadia manages customer complaints and dispute resolution. She handles transaction errors, blocked cards, failed transfers, and escalates complex issues with empathy and full context retention.',
};

// ─── State ────────────────────────────────────────────────────────
let currentTab = 'overview';
let callState  = {};   // { sara:'idle'|'connecting'|'active', ... }
let callTimers = {};   // { sara: interval }
let callElapsed = {};  // { sara: seconds }
let retellClient = null;

Object.keys(AGENTS).forEach(k => { callState[k] = 'idle'; callElapsed[k] = 0; });

// ─── Helpers ──────────────────────────────────────────────────────
function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
       + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
function fmtDuration(sec) {
  if (!sec) return '—';
  const m = Math.floor(sec/60), s = sec%60;
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}
function fmtTimer(sec) {
  return String(Math.floor(sec/60)).padStart(2,'0') + ':' + String(sec%60).padStart(2,'0');
}
function avgDuration(calls) {
  const v = calls.filter(c=>c.duration_seconds);
  return v.length ? Math.round(v.reduce((s,c)=>s+c.duration_seconds,0)/v.length) : 0;
}
function groupByDay(calls) {
  const map = {};
  calls.forEach(c => {
    if (!c.started_at) return;
    const key = new Date(c.started_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    map[key] = (map[key]||0) + 1;
  });
  return Object.entries(map).slice(-14).map(([date,count])=>({date,count}));
}
function durationBuckets(calls) {
  const b = [{label:'<30s',count:0},{label:'30-60s',count:0},{label:'1-2m',count:0},{label:'2-5m',count:0},{label:'>5m',count:0}];
  calls.forEach(c => {
    const d = c.duration_seconds||0;
    if(d<30)b[0].count++;
    else if(d<60)b[1].count++;
    else if(d<120)b[2].count++;
    else if(d<300)b[3].count++;
    else b[4].count++;
  });
  return b;
}

// ─── API ──────────────────────────────────────────────────────────
const cache = {};
async function fetchCalls(agentId) {
  if (cache[agentId]) return cache[agentId];
  try {
    const r = await fetch(`/api/calls?agentId=${agentId}`);
    const d = await r.json();
    const arr = d.calls || [];
    cache[agentId] = arr;
    return arr;
  } catch(e) { return []; }
}

// ─── Retell calls ─────────────────────────────────────────────────
const RETELL_KEY = 'key_52cf8f696d64009de42d4196e27c';

async function createWebCall(agentId) {
  // Try the server-side proxy first (works on Vercel)
  // Fall back to calling Retell directly (works locally)
  const isLocal = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (!isLocal) {
    try {
      const r = await fetch('/api/create-web-call', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({agent_id: agentId}),
      });
      const d = await r.json();
      if (d.access_token) return d;
    } catch(e) {}
  }
  // Direct call to Retell (local dev / fallback)
  const r = await fetch('https://api.retellai.com/v2/create-web-call', {
    method: 'POST',
    headers: {'Authorization': `Bearer ${RETELL_KEY}`, 'Content-Type':'application/json'},
    body: JSON.stringify({agent_id: agentId}),
  });
  return await r.json();
}

async function startCall(agentKey) {
  const agent = AGENTS[agentKey];
  updateCallState(agentKey, 'connecting');
  try {
    const data = await createWebCall(agent.id);
    if (!data.access_token) throw new Error(data.error || 'No token');

    if (!retellClient) retellClient = new RetellWebClient();
    retellClient.on('call_started', () => { updateCallState(agentKey,'active'); startTimer(agentKey); });
    retellClient.on('call_ended',   () => stopCall(agentKey));
    retellClient.on('error',        () => stopCall(agentKey));

    await retellClient.startCall({accessToken: data.access_token});
    updateCallState(agentKey, 'active');
    startTimer(agentKey);
  } catch(e) {
    console.error(e);
    updateCallState(agentKey, 'idle');
  }
}

function stopCall(agentKey) {
  if (retellClient) { try { retellClient.stopCall(); } catch(e) {} }
  clearInterval(callTimers[agentKey]);
  callElapsed[agentKey] = 0;
  updateCallState(agentKey, 'idle');
}

function startTimer(agentKey) {
  callElapsed[agentKey] = 0;
  callTimers[agentKey] = setInterval(() => {
    callElapsed[agentKey]++;
    const el = document.getElementById(`timer-${agentKey}`);
    if (el) el.textContent = fmtTimer(callElapsed[agentKey]);
  }, 1000);
}

function updateCallState(agentKey, state) {
  callState[agentKey] = state;
  renderCallWidget(agentKey);
}

// ─── Render call widget ───────────────────────────────────────────
function renderCallWidget(agentKey) {
  const el = document.getElementById(`call-widget-${agentKey}`);
  if (!el) return;
  const agent  = AGENTS[agentKey];
  const state  = callState[agentKey];
  const active = state === 'active';
  const connecting = state === 'connecting';

  el.innerHTML = `
    <div class="call-card-header">
      <div>
        <div class="call-agent-name">${agent.name}</div>
        <div class="call-agent-role">${agent.role}</div>
      </div>
      <div class="call-avatar ${agent.avatarClass}">${agent.emoji}</div>
    </div>
    <div class="call-status ${active ? 'active-call' : ''}">
      <div class="call-status-dot"></div>
      ${active
        ? `Live — <span class="call-timer" id="timer-${agentKey}">${fmtTimer(callElapsed[agentKey])}</span>`
        : connecting ? 'Connecting…' : 'Ready to call'}
    </div>
    <button
      class="call-btn ${agent.btnClass} ${active ? 'btn-end' : ''}"
      onclick="${active ? `stopCall('${agentKey}')` : `startCall('${agentKey}')`}"
      ${connecting ? 'disabled' : ''}
    >
      ${active ? '⏹ End Call' : connecting ? '⏳ Connecting…' : `📞 Talk to ${agent.name}`}
    </button>
  `;
}

// ─── Modal ────────────────────────────────────────────────────────
function openTranscript(text) {
  document.getElementById('modalBody').textContent = text || '(No transcript)';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOutside(e) { if (e.target.id==='modalOverlay') closeModal(); }

// ─── Nav ──────────────────────────────────────────────────────────
const TAB_TITLES = {
  overview: 'Banking Voice Agents',
  sara:  'Sara — FAQ Support',
  zara:  'Zara — Sales',
  nadia: 'Nadia — Complaints',
};

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('topbar-title').textContent = TAB_TITLES[tab];
  ['overview','sara','zara','nadia'].forEach(id => {
    const el = document.getElementById(`nav-${id}`);
    if (el) el.classList.toggle('active', id === tab);
  });
  renderTab(tab);
}

function logout() {
  localStorage.removeItem('banking_auth');
  window.location.href = 'login.html';
}

// ─── Render helpers ───────────────────────────────────────────────
function statsHTML(calls) {
  const total    = calls.length;
  const avg      = avgDuration(calls);
  const withRec  = calls.filter(c=>c.recording_url).length;
  const today    = calls.filter(c => {
    if (!c.started_at) return false;
    return new Date(c.started_at).toDateString() === new Date().toDateString();
  }).length;
  return `
    <div class="stats-grid">
      ${[
        {label:'Total Calls',   value:total,              sub:'All time'},
        {label:'Avg Duration',  value:fmtDuration(avg),   sub:'Per call'},
        {label:'Today',         value:today,              sub:'Calls today'},
        {label:'Recordings',    value:withRec,            sub:`${total?Math.round(withRec/total*100):0}% captured`},
      ].map(s=>`
        <div class="stat-card">
          <div class="stat-label">${s.label}</div>
          <div class="stat-value">${s.value}</div>
          <div class="stat-sub">${s.sub}</div>
        </div>
      `).join('')}
    </div>`;
}

function chartsHTML(agentKey) {
  return `
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Call Volume</div>
        <div class="chart-sub">Last 14 days</div>
        <div class="chart-area" id="chart-area-${agentKey}"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Duration Distribution</div>
        <div class="chart-sub">Call length buckets</div>
        <div class="chart-area" id="chart-dur-${agentKey}"></div>
      </div>
    </div>`;
}

function callsTableHTML(calls, agentKey) {
  if (!calls.length) {
    return `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">No calls yet</div>
      <div class="empty-sub">Make a call above to see it appear here</div>
    </div>`;
  }
  const rows = calls.map(c => {
    const pca = c.analysis && Object.keys(c.analysis).length
      ? Object.entries(c.analysis).slice(0,4).map(([k,v])=>`<span class="pca-pill" title="${k}: ${v}">${k}: ${String(v).slice(0,25)}</span>`).join('')
      : '<span class="no-rec">—</span>';
    const rec = c.recording_url
      ? `<a class="recording-btn" href="${c.recording_url}" target="_blank" rel="noopener">▶ Play</a>`
      : `<span class="no-rec">N/A</span>`;
    const trans = c.transcript
      ? `<div class="transcript-wrap">
           <div class="transcript-preview">${c.transcript}</div>
           <span class="expand-btn" onclick="openTranscript(${JSON.stringify(c.transcript)})">View full</span>
         </div>`
      : '<span class="no-rec">—</span>';
    return `<tr>
      <td><span class="call-id-code">${c.call_id.slice(0,14)}…</span></td>
      <td>${fmtDate(c.started_at)}</td>
      <td><span class="duration-badge">${fmtDuration(c.duration_seconds)}</span></td>
      <td>${rec}</td>
      <td>${trans}</td>
      <td><div class="pca-pills">${pca}</div></td>
    </tr>`;
  });
  return `<div style="overflow-x:auto">
    <table class="calls-table">
      <thead><tr>${['Call ID','Started','Duration','Recording','Transcript','Analysis'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
  </div>`;
}

function renderCharts(agentKey, calls) {
  const { AreaChart, Area, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;
  const agent = AGENTS[agentKey];
  const daily = groupByDay(calls);
  const buckets = durationBuckets(calls);

  // Area chart
  const areaEl = document.getElementById(`chart-area-${agentKey}`);
  if (areaEl) {
    if (daily.length) {
      const areaChart = React.createElement(ResponsiveContainer, {width:'100%',height:'100%'},
        React.createElement(AreaChart, {data:daily},
          React.createElement('defs', null,
            React.createElement('linearGradient', {id:`ga-${agentKey}`,x1:'0',y1:'0',x2:'0',y2:'1'},
              React.createElement('stop',{offset:'5%',stopColor:agent.color,stopOpacity:0.2}),
              React.createElement('stop',{offset:'95%',stopColor:agent.color,stopOpacity:0})
            )
          ),
          React.createElement(CartesianGrid,{stroke:'#f3f4f6',vertical:false}),
          React.createElement(XAxis,{dataKey:'date',tick:{fontSize:11,fill:'#9ca3af'},axisLine:false,tickLine:false}),
          React.createElement(YAxis,{tick:{fontSize:11,fill:'#9ca3af'},axisLine:false,tickLine:false,width:28,allowDecimals:false}),
          React.createElement(Tooltip,{contentStyle:{borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:12}}),
          React.createElement(Area,{type:'monotone',dataKey:'count',stroke:agent.color,strokeWidth:2,fill:`url(#ga-${agentKey})`})
        )
      );
      ReactDOM.createRoot(areaEl).render(areaChart);
    } else {
      areaEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:13px">No data yet</div>`;
    }
  }

  // Bar chart
  const durEl = document.getElementById(`chart-dur-${agentKey}`);
  if (durEl) {
    const barChart = React.createElement(ResponsiveContainer, {width:'100%',height:'100%'},
      React.createElement(BarChart, {data:buckets,barSize:28},
        React.createElement(CartesianGrid,{stroke:'#f3f4f6',vertical:false}),
        React.createElement(XAxis,{dataKey:'label',tick:{fontSize:11,fill:'#9ca3af'},axisLine:false,tickLine:false}),
        React.createElement(YAxis,{tick:{fontSize:11,fill:'#9ca3af'},axisLine:false,tickLine:false,width:24,allowDecimals:false}),
        React.createElement(Tooltip,{contentStyle:{borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:12}}),
        React.createElement(Bar,{dataKey:'count',fill:agent.color,radius:[4,4,0,0]})
      )
    );
    ReactDOM.createRoot(durEl).render(barChart);
  }
}

// ─── Tab renderers ────────────────────────────────────────────────
async function renderAgentTab(agentKey) {
  const agent = AGENTS[agentKey];
  const root = document.getElementById('app-root');

  root.innerHTML = `
    <div class="call-section">
      <div class="call-card" id="call-widget-${agentKey}">
        <div style="text-align:center;padding:32px;color:#9ca3af;font-size:13px"><span class="spinner"></span> Loading…</div>
      </div>
      <div class="about-card">
        <div class="about-name">About ${agent.name}</div>
        <div class="about-text">${ABOUT[agentKey]}</div>
      </div>
    </div>
    <div id="stats-${agentKey}"><div style="padding:20px 0;color:#9ca3af;font-size:13px"><span class="spinner"></span> Loading calls…</div></div>
    ${chartsHTML(agentKey)}
    <div class="calls-card">
      <div class="calls-card-header">
        <div class="calls-card-title">Call History</div>
        <div class="calls-count-badge" id="count-badge-${agentKey}">…</div>
      </div>
      <div id="calls-body-${agentKey}"><div style="padding:32px;text-align:center;color:#9ca3af;font-size:13px"><span class="spinner"></span></div></div>
    </div>
  `;

  renderCallWidget(agentKey);

  const calls = await fetchCalls(agent.id);

  document.getElementById(`stats-${agentKey}`).innerHTML = statsHTML(calls);
  document.getElementById(`count-badge-${agentKey}`).textContent = `${calls.length} calls`;
  document.getElementById(`calls-body-${agentKey}`).innerHTML = callsTableHTML(calls, agentKey);
  renderCharts(agentKey, calls);
}

async function renderOverview() {
  const root = document.getElementById('app-root');

  root.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)" id="overview-stats">
      ${Object.values(AGENTS).map(a=>`
        <div class="stat-card" style="border-top:3px solid ${a.color}">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="width:10px;height:10px;border-radius:50%;background:${a.color}"></div>
            <div style="font-size:12px;font-weight:600;color:#6b7280">${a.name} — ${a.role}</div>
          </div>
          <div class="stat-value" id="ov-count-${a.name.toLowerCase()}"><span class="spinner"></span></div>
          <div class="stat-sub" id="ov-avg-${a.name.toLowerCase()}">Loading…</div>
        </div>
      `).join('')}
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Combined Call Volume</div>
        <div class="chart-sub">All agents — last 14 days</div>
        <div class="chart-area" id="ov-area"></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Distribution</div>
        <div class="chart-sub">Calls per agent</div>
        <div class="chart-area" id="ov-pie"></div>
      </div>
    </div>
  `;

  const results = await Promise.all(
    Object.entries(AGENTS).map(([k,a]) => fetchCalls(a.id).then(calls => ({k, a, calls})))
  );

  results.forEach(({k, a, calls}) => {
    const nameKey = a.name.toLowerCase();
    document.getElementById(`ov-count-${nameKey}`).textContent = calls.length;
    document.getElementById(`ov-avg-${nameKey}`).textContent   = `Avg ${fmtDuration(avgDuration(calls))} per call`;
  });

  // Combined area chart
  const combined = {};
  results.forEach(({calls}) => {
    calls.forEach(c => {
      if (!c.started_at) return;
      const key = new Date(c.started_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      combined[key] = (combined[key]||0)+1;
    });
  });
  const combinedData = Object.entries(combined).slice(-14).map(([date,count])=>({date,count}));
  const totalAll = results.reduce((s,{calls})=>s+calls.length,0);

  const { AreaChart, Area, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend } = Recharts;

  const areaEl = document.getElementById('ov-area');
  if (areaEl) {
    if (combinedData.length) {
      ReactDOM.createRoot(areaEl).render(
        React.createElement(ResponsiveContainer,{width:'100%',height:'100%'},
          React.createElement(AreaChart,{data:combinedData},
            React.createElement('defs',null,
              React.createElement('linearGradient',{id:'ov-grad',x1:'0',y1:'0',x2:'0',y2:'1'},
                React.createElement('stop',{offset:'5%',stopColor:'#00c8f0',stopOpacity:0.2}),
                React.createElement('stop',{offset:'95%',stopColor:'#00c8f0',stopOpacity:0})
              )
            ),
            React.createElement(CartesianGrid,{stroke:'#f3f4f6',vertical:false}),
            React.createElement(XAxis,{dataKey:'date',tick:{fontSize:11,fill:'#9ca3af'},axisLine:false,tickLine:false}),
            React.createElement(YAxis,{tick:{fontSize:11,fill:'#9ca3af'},axisLine:false,tickLine:false,width:28,allowDecimals:false}),
            React.createElement(Tooltip,{contentStyle:{borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:12}}),
            React.createElement(Area,{type:'monotone',dataKey:'count',stroke:'#00c8f0',strokeWidth:2,fill:'url(#ov-grad)'})
          )
        )
      );
    } else {
      areaEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:13px">No data yet</div>`;
    }
  }

  const pieEl = document.getElementById('ov-pie');
  if (pieEl) {
    const pieData = results.map(({a,calls})=>({name:a.name,value:calls.length,color:a.color}));
    if (totalAll > 0) {
      ReactDOM.createRoot(pieEl).render(
        React.createElement(ResponsiveContainer,{width:'100%',height:'100%'},
          React.createElement(PieChart,null,
            React.createElement(Pie,{data:pieData,dataKey:'value',cx:'50%',cy:'50%',innerRadius:55,outerRadius:80,paddingAngle:3},
              ...pieData.map(e=>React.createElement(Cell,{key:e.name,fill:e.color}))
            ),
            React.createElement(Tooltip,{contentStyle:{borderRadius:'8px',border:'1px solid #e5e7eb',fontSize:12}}),
            React.createElement(Legend,{iconType:'circle',iconSize:8,wrapperStyle:{fontSize:12}})
          )
        )
      );
    } else {
      pieEl.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;font-size:13px">No data yet</div>`;
    }
  }
}

// ─── Main render ──────────────────────────────────────────────────
function renderTab(tab) {
  if (tab === 'overview') {
    renderOverview();
  } else {
    renderAgentTab(tab);
  }
}

// Boot
renderTab('overview');
</script>
</body>
</html>
